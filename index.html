<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quick Draw AI 提示遊戲</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;background:#f1f5f9;color:#0f172a;margin:0;padding:16px;}
    .container{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:18px;align-items:start;}
    .panel{background:#fff;border:1px solid #d1d5db;border-radius:16px;padding:20px;box-shadow:0 18px 45px rgba(15,23,42,0.08);}
    h1{margin:0 0 10px;font-size:1.8rem;}
    h2{margin:20px 0 10px;font-size:1.1rem;color:#334155;}
    #canvas{width:100%;max-width:600px;aspect-ratio:1/1;border:2px solid #cbd5e1;border-radius:18px;background:#fff;touch-action:none;cursor:crosshair;}
    .canvas-panel{display:flex;align-items:center;justify-content:center;}
    .buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;}
    button{border:none;border-radius:12px;padding:12px 16px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;}
    button:hover{transform:translateY(-1px);}
    .primary{background:#2563eb;color:#fff;box-shadow:0 12px 24px rgba(37,99,235,0.18);}
    .secondary{background:#e2e8f0;color:#0f172a;}
    .danger{background:#ef4444;color:#fff;}
    .status{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:12px;font-size:0.95rem;}
    .badge{background:#e0f2fe;color:#0c4a6e;padding:8px 12px;border-radius:999px;font-size:0.9rem;}
    .hint-box{margin-top:16px;padding:16px;background:#eff6ff;border-left:4px solid #2563eb;border-radius:12px;color:#0f172a;line-height:1.6;}
    .prediction-list{margin-top:16px;display:grid;gap:10px;}
    .prediction-item{display:flex;justify-content:space-between;padding:14px 16px;background:#f8fafc;border-radius:14px;border:1px solid #e2e8f0;}
    .prediction-item span:first-child{font-weight:700;}
    @media(max-width:900px){.container{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <h1>Quick Draw AI 提示遊戲</h1>
      <div class="status"><span class="badge" id="statusBadge">載入中...</span><span id="statusText">正在讀取模型與標籤...</span></div>
      <div class="status">目標：<strong id="targetWord">-</strong></div>
      <div class="hint-box" id="hintBox">等待模型載入後開始遊戲，按「換一個目標」取得新的提示對象。</div>
      <div class="buttons">
        <button class="primary" id="newTarget">換一個目標</button>
        <button class="secondary" id="hintButton">提示</button>
        <button class="secondary" id="predictButton">預測</button>
        <button class="danger" id="clearButton">清除畫布</button>
      </div>
      <div class="status" id="guessText">AI 將會預測你畫的是什麼。</div>
    </section>

    <section class="panel canvas-panel">
      <canvas id="canvas" width="280" height="280"></canvas>
    </section>

    <section class="panel">
      <h2>預測結果</h2>
      <div class="prediction-list" id="predictions"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusBadge = document.getElementById('statusBadge');
    const statusText = document.getElementById('statusText');
    const targetWord = document.getElementById('targetWord');
    const hintBox = document.getElementById('hintBox');
    const guessText = document.getElementById('guessText');
    const predictionsEl = document.getElementById('predictions');
    const newTargetButton = document.getElementById('newTarget');
    const hintButton = document.getElementById('hintButton');
    const predictButton = document.getElementById('predictButton');
    const clearButton = document.getElementById('clearButton');

    const MODEL_PATH = './model.json';
    const LABELS_PATH = './labels.txt';
    let model = null;
    let labels = [];
    let currentTarget = '';
    let round = 0;

    const hints = {
      apple: '畫一個圓形，頂端加一片葉子，像蘋果。',
      sun: '畫一個大圓，周圍畫出放射狀的光線。',
      umbrella: '畫半圓形上方，下方加一根彎曲的傘柄。',
      house: '畫一個四方形加三角形屋頂，再加門窗。',
      fish: '畫橢圭形魚身，尾巴和魚鰭。',
      banana: '畫一個彎曲的香蕉，注意弧度。',
      eyeglasses: '畫兩個圓形連在一起的鏡框。',
      cat: '畫一個有尖耳朵和鬍鬚的貓頭。',
      dog: '畫一個大耳朵和鼻子明顯的狗頭。',
      car: '畫車身和車輪，車窗可畫成矩形。',
      tree: '畫一個樹幹，樹頂像一朵雲。',
      cloud: '畫幾個圓圓的雲朵連在一起。',
      star: '畫一顆五角星或多邊星形。',
      moon: '畫一個彎彎的月亮。',
      mountain: '畫三角形疊在一起當山峰。'
    };

    function setStatus(level, text){
      statusBadge.textContent = level;
      statusText.textContent = text;
    }

    function clearCanvas(){
      ctx.fillStyle = 'white';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      predictionsEl.innerHTML = '';
      guessText.textContent = '';
    }

    function chooseTarget(){
      if(labels.length === 0) return;
      round += 1;
      const idx = Math.floor(Math.random() * labels.length);
      currentTarget = labels[idx];
      targetWord.textContent = currentTarget;
      guessText.textContent = `第 ${round} 回合：請畫出「${currentTarget}」。`;
      hintBox.textContent = '按「提示」取得作畫建議。';
    }

    function preprocess(){
      const off = document.createElement('canvas');
      off.width = 28;
      off.height = 28;
      const octx = off.getContext('2d');
      octx.fillStyle = 'white';
      octx.fillRect(0,0,28,28);
      octx.drawImage(canvas, 0, 0, 28, 28);
      const imageData = octx.getImageData(0,0,28,28).data;
      const arr = new Float32Array(28 * 28);
      for(let i = 0; i < 28 * 28; i++){
        const r = imageData[i * 4];
        arr[i] = (255 - r) / 255;
      }
      return tf.tensor4d(arr, [1,28,28,1]);
    }

    async function predictDraw(){
      if(!model){
        return alert('模型尚未載入，請稍後再試。');
      }
      const x = preprocess();
      const logits = model.predict(x);
      const data = await logits.data();
      x.dispose();
      if(logits.dispose) logits.dispose();

      const results = Array.from(data).map((prob, i) => ({ name: labels[i] || (`class ${i}`), prob }));
      results.sort((a,b) => b.prob - a.prob);
      predictionsEl.innerHTML = '';
      results.slice(0,3).forEach(item => {
        const row = document.createElement('div');
        row.className = 'prediction-item';
        row.innerHTML = `<span>${item.name}</span><span>${(item.prob*100).toFixed(1)}%</span>`;
        predictionsEl.appendChild(row);
      });

      const top = results[0];
      const score = (top.prob * 100).toFixed(1);
      if(top.name === currentTarget && top.prob > 0.35){
        guessText.textContent = `🎉 AI 認為你畫的是「${top.name}」，信心 ${score}%。`;
        hintBox.textContent = '太棒了！按「換一個目標」開始下一回合。';
      } else if(top.prob < 0.35){
        guessText.textContent = `AI 看起來不太確定，最像的是 ${top.name}（${score}%）。`;
        hintBox.textContent = hints[currentTarget] ? `提示：${hints[currentTarget]}` : '提示：試著畫出目標物的主要輪廓與特徵。';
      } else {
        guessText.textContent = `AI 目前最像：${top.name}（${score}%）。`;
        hintBox.textContent = top.name === currentTarget ? `提示：你已經很接近「${currentTarget}」了，再加強特徵即可。` : `提示：目前 AI 認為是 ${top.name}，你可以試著更像「${currentTarget}」的特徵。`;
      }
    }

    function showHint(){
      const text = hints[currentTarget] || '試著畫出目標物的主要形狀。';
      hintBox.textContent = `提示：${text}`;
    }

    async function loadLabels(){
      try{
        const resp = await fetch(LABELS_PATH);
        if(!resp.ok) throw new Error('載入 labels.txt 失敗');
        labels = (await resp.text()).trim().split(/\r?\n/).filter(Boolean);
      }catch(err){
        console.warn('使用預設標籤', err);
        labels = ['apple','sun','umbrella','house','fish','banana','eyeglasses','cat','dog','car','tree','cloud','star','moon','mountain'];
      }
    }

    async function loadModel(){
      try{
        setStatus('載入中...', '正在載入模型...');
        const resp = await fetch(MODEL_PATH);
        if(!resp.ok) throw new Error('無法取得 model.json');
        const j = await resp.json();

        try{
          const layers = j.modelTopology?.model_config?.config?.layers;
          if(Array.isArray(layers)){
            for(const l of layers){
              if(l.class_name === 'InputLayer' && l.config && l.config.batch_shape){
                l.config.batchInputShape = l.config.batch_shape;
                delete l.config.batch_shape;
              }
            }
          }
          const manifest = j.weightsManifest;
          if(Array.isArray(manifest)){
            const allNames = manifest.flatMap(m => m.weights.map(w => w.name));
            if(allNames.length > 0){
              const prefix = allNames[0].split('/')[0];
              const shouldStrip = prefix.startsWith('sequential') || prefix.startsWith('functional') || prefix.startsWith('model');
              if(shouldStrip && allNames.every(n => n.startsWith(prefix + '/'))){
                for(const group of manifest){
                  for(const w of group.weights){
                    w.name = w.name.replace(prefix + '/', '');
                  }
                }
              }
            }
          }
        }catch(e){
          console.warn('模型 JSON 正規化失敗', e);
        }

        model = await tf.models.modelFromJSON(j);
        setStatus('已載入', '模型已載入完成，開始遊戲吧！');
      }catch(err){
        console.error(err);
        setStatus('錯誤', '模型載入失敗，請檢查 Console 以獲取詳細資訊。');
      }
    }

    canvas.addEventListener('pointerdown', e => { ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); canvas.isDrawing = true; });
    canvas.addEventListener('pointermove', e => { if(!canvas.isDrawing) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); });
    window.addEventListener('pointerup', () => { canvas.isDrawing = false; });

    clearButton.addEventListener('click', clearCanvas);
    newTargetButton.addEventListener('click', () => { clearCanvas(); chooseTarget(); });
    hintButton.addEventListener('click', showHint);
    predictButton.addEventListener('click', predictDraw);

    async function init(){
      ctx.fillStyle = 'white';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'black';
      ctx.lineWidth = 20;
      await loadLabels();
      await loadModel();
      chooseTarget();
    }

    init();
  </script>
</body>
</html>
